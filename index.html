<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DV Flight Club 26</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
  }

  /* Zentrierung im ganzen Bildschirm */
  .wrapper {
    display: flex;
    justify-content: center;  /* horizontal */
    align-items: center;      /* vertikal */
    height: 100vh;            /* volle Bildschirmhöhe */
    background-color: #f5f5f5;
  }

  .container {
    display: flex;
    align-items: center;
    gap: 40px;
    flex-wrap: wrap;
  }

  .logo img {
    width: 100%;
    max-width: 250px;
    height: auto;
  }

  .info {
    max-width: 500px;
  }

  .info h1 {
    margin: 0;
    font-size: clamp(20px, 3vw, 28px);
  }

  .info p {
    margin: 6px 0;
    font-size: clamp(14px, 2vw, 18px);
  }

  .info a {
    color: blue;
    text-decoration: underline;
  }

  /* Mobile */
  @media (max-width: 600px) {
    .container {
      flex-direction: column;
      text-align: center;
    }
  }
</style>
</head>

<body>

<div class="wrapper">
  <div class="container">

    <div class="logo">
      <img src="logo.png" alt="DV Flight Club 26">
    </div>

    <div class="info">
      <h1>DV Flight Club 26 Längenfeld</h1>
      <p>Unterried xx, 6444 Längenfeld</p>
      <p><a href="mailto:info@dvflightclub26.at">info@dvflightclub26.at</a></p>
      <p>+43 650 5746007</p>
    </div>

  </div>
</div>

</body>
</html>
